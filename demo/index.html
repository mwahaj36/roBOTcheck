<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>roBOTcheck — Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e0f3c, #07090e 55%), 
                        radial-gradient(circle at bottom left, #0e203c, #07090e 70%);
            color: #c9d1d9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        .form-container {
            background: rgba(22, 27, 34, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 20px;
            padding: 32px;
            width: 360px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 
                        inset 0 1px 0 rgba(255,255,255,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .form-container:hover {
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h2 {
            margin: 0 0 6px 0;
            font-weight: 600;
            font-size: 22px;
            background: linear-gradient(135deg, #f0f6fc, #8b949e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header p {
            margin: 0;
            font-size: 13px;
            color: #8b949e;
            font-weight: 300;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 500;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="email"] {
            width: 100%;
            background: rgba(13, 17, 23, 0.85);
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #f0f6fc;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="email"]:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.15);
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #2ea043, #238636);
            color: #ffffff;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: filter 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(35, 134, 54, 0.25);
        }
        button:hover {
            filter: brightness(1.1);
        }
        button:active {
            transform: scale(0.98);
        }
        .robotcheck {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }
        /* Status Banner Alert Styles */
        .status-box {
            display: none;
            margin-top: 20px;
            border-radius: 8px;
            padding: 14px;
            font-size: 13px;
            line-height: 1.5;
            animation: fadeIn 0.4s ease forwards;
        }
        .status-box h4 {
            margin: 0 0 6px 0;
            font-size: 14px;
            font-weight: 600;
        }
        .status-box.success {
            background: rgba(46, 160, 67, 0.1);
            border: 1px solid rgba(46, 160, 67, 0.45);
            color: #56d364;
            box-shadow: 0 4px 15px rgba(46, 160, 67, 0.1);
        }
        .status-box.error {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.45);
            color: #ff7b72;
            box-shadow: 0 4px 15px rgba(248, 81, 73, 0.1);
        }
        .status-box ul {
            margin: 6px 0 0 0;
            padding-left: 18px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script>
        window.ROBOTCHECK_CONFIG = {
            apiUrl: 'http://localhost:3000'
        }
    </script>
</head>
<body>
    <div class="form-container">
        <div class="header">
            <h2>Newsletter</h2>
            <p>Join the loop. No bots admitted.</p>
        </div>
        <form id="rc-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email-input" name="email" required placeholder="name@example.com">
            </div>
            
            <div class="robotcheck" data-sitekey="rc_pub_a1b2c3d4e5f6"></div>
            
            <input type="hidden" name="robotcheckToken" id="rc-token-input">
            
            <button type="submit">Subscribe</button>
        </form>

        <div id="status-box" class="status-box"></div>
    </div>

    <script src="http://localhost:3000/dist/widget.js"></script>
    <script>
        robotcheck.onPass((token) => {
            document.getElementById('rc-token-input').value = token
            console.log("Verification pass token recorded.")
        })

        document.getElementById('rc-form').addEventListener('submit', function(e) {
            e.preventDefault()
            
            const email = document.getElementById('email-input').value
            const token = document.getElementById('rc-token-input').value
            const statusBox = document.getElementById('status-box')

            // Reset status box display
            statusBox.style.display = 'none'
            statusBox.className = 'status-box'
            statusBox.innerHTML = ''

            const confirmEmail = document.querySelector('input[name="confirmEmail"]')?.value || ''

            fetch('/submit-form', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, robotcheckToken: token, confirmEmail })
            })
            .then(res => res.json())
            .then(data => {
                statusBox.style.display = 'block'
                if (data.success) {
                    statusBox.classList.add('success')
                    statusBox.innerHTML = `
                        <h4>Subscription Successful</h4>
                        <p>Welcome, human subscriber: <strong>${data.email}</strong>.</p>
                        <p>roBOTcheck verification stats:</p>
                        <ul>
                            <li>Verdict Score: <strong>${data.score}/100</strong> (lower is more human)</li>
                            <li>Rounds Completed: <strong>${data.roundsCompleted}</strong></li>
                        </ul>
                    `
                } else {
                    statusBox.classList.add('error')
                    statusBox.innerHTML = `
                        <h4>Verification Failed</h4>
                        <p>${data.error}</p>
                    `
                }
            })
            .catch(err => {
                statusBox.style.display = 'block'
                statusBox.classList.add('error')
                statusBox.innerHTML = `
                    <h4>System Error</h4>
                    <p>Could not connect to verify endpoint: ${err.message}</p>
                `
            })
        })
    </script>
</body>
</html>
